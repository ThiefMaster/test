name: Test

on:
  workflow_dispatch: {}


permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: |
          date > now.txt
          git config user.name test
          git config user.email dreyercito@users.noreply.github.com
          git add now.txt
          git commit -m test
          git push
